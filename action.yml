name: Doublcov
description: Find what's missing with a static Doublcov LCOV coverage report from any project that can emit LCOV.

inputs:
  version:
    description: Doublcov release tag to download, or latest.
    required: false
    default: latest
  repository:
    description: Repository that publishes Doublcov release binaries.
    required: false
    default: doublesharp/doublcov
  command:
    description: Doublcov command to run. Use an empty command with install-only=true to only add doublcov to PATH.
    required: false
    default: build
  args:
    description: Arguments passed to the Doublcov command. The action adds --no-open unless args already includes --open or --no-open.
    required: false
    default: ""
  install-only:
    description: Download Doublcov and add it to PATH without running it.
    required: false
    default: "false"

outputs:
  path:
    description: Absolute path to the downloaded Doublcov executable.

runs:
  using: node20
  main: scripts/github-action.mjs
