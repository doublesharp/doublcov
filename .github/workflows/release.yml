name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify publish package
        run: pnpm run verify:publish

  binary:
    name: Binary ${{ matrix.asset }}
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: doublcov-linux-x64
          - runner: ubuntu-24.04-arm
            asset: doublcov-linux-arm64
          - runner: macos-26-intel
            asset: doublcov-macos-x64
          - runner: macos-26
            asset: doublcov-macos-arm64
          - runner: windows-latest
            asset: doublcov-windows-x64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build binary
        run: pnpm run build:binary

      - name: Smoke binary
        shell: bash
        run: packages/cli/dist/bin/${{ matrix.asset }} --help

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: packages/cli/dist/bin/${{ matrix.asset }}
          if-no-files-found: error

  github-release:
    name: GitHub Release
    needs: binary
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Prepare assets
        shell: bash
        run: |
          mkdir -p release-assets
          find release-artifacts -type f -name 'doublcov-*' -exec cp {} release-assets/ \;
          (cd release-assets && sha256sum doublcov-* > SHA256SUMS)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* --title "$TAG_NAME" --notes-file CHANGELOG.md
          fi

  npm:
    name: npm Publish
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build

      - name: Check npm package version
        id: npm-version
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          if npm view "@0xdoublesharp/doublcov@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.npm-version.outputs.exists != 'true'
        run: npm publish ./packages/cli --access public --provenance --ignore-scripts

      - name: Skip existing package version
        if: steps.npm-version.outputs.exists == 'true'
        run: echo "Package version already exists on npm; skipping publish."

  container:
    name: Container Image ${{ matrix.platform }}
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/doublesharp/doublcov:${{ github.ref_name }}-${{ matrix.suffix }}
            ghcr.io/doublesharp/doublcov:latest-${{ matrix.suffix }}

  container-manifest:
    name: Container Manifest
    needs: container
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish multi-arch tags
        env:
          IMAGE: ghcr.io/doublesharp/doublcov
          TAG_NAME: ${{ github.ref_name }}
        run: |
          docker buildx imagetools create \
            -t "$IMAGE:$TAG_NAME" \
            "$IMAGE:$TAG_NAME-amd64" \
            "$IMAGE:$TAG_NAME-arm64"
          docker buildx imagetools create \
            -t "$IMAGE:latest" \
            "$IMAGE:latest-amd64" \
            "$IMAGE:latest-arm64"
