name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (eslint)
        run: pnpm run lint

      - name: Lint (circular deps)
        run: pnpm run lint:circular

      - name: Lint (unused exports / deps via knip)
        run: pnpm run lint:knip

      - name: Verify publish package
        run: pnpm run verify:publish

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run browser E2E tests
        run: pnpm run test:e2e
